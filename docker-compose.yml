services:
    php-apache-environment:
        container_name: recept
        image: php:7.4-apache
        build:
            context: ./recept
            dockerfile: Dockerfile
        depends_on:
            db:
                condition: service_healthy
        environment:
            DB_HOST: db
            MYSQL_DATABASE: MYSQL_DATABASE
            MYSQL_USER: MYSQL_USER
            MYSQL_PASSWORD: MYSQL_PASSWORD
        volumes:
            - ./recept/:/var/www/html/
        ports:
            - 8899:80
    db:
        container_name: receptdb
        image: mysql:8.0
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: MYSQL_ROOT_PASSWORD
            MYSQL_DATABASE: MYSQL_DATABASE
            MYSQL_USER: MYSQL_USER
            MYSQL_PASSWORD: MYSQL_PASSWORD
        ports:
            - "9906:3306"
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pMYSQL_ROOT_PASSWORD"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 20s
        volumes:
            - ./mysql/recept.sql:/docker-entrypoint-initdb.d/recept.sql

